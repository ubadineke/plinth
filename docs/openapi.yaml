openapi: 3.0.3
info:
  title: Plinth API
  version: 0.9.0
  description: |
    Recurring billing for Nigerian SaaS — card charging, bank transfers via virtual accounts,
    proration, dunning, and recovery in one API.

    All amounts are in **kobo** (1/100th of a Naira). ₦5,000 = `500000`.

servers:
  - url: https://api.useplinth.xyz
    description: Production
  - url: http://localhost:7331
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Sandbox
    description: Create an isolated sandbox environment for testing. No auth required.
  - name: Customers
    description: Who you are billing. One customer can have multiple subscriptions.
  - name: Plans
    description: Plan groups and the plans within them. Customers subscribe to plans.
  - name: Subscriptions
    description: The recurring billing relationship between a customer and a plan.
  - name: Virtual Accounts
    description: Dedicated bank account numbers for customers who pay by transfer.
  - name: Invoices
    description: Created at each billing cycle. Tracks what a customer owes for a period.
  - name: Webhooks
    description: Register endpoints that receive signed, retried events. See Receiving webhooks.
  - name: Admin
    description: Test clock control, billing tick, and suspense resolution. Test-mode only.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Use `sk_test_` keys for sandbox. Use `sk_live_` keys for production.
        Obtain your key from the dashboard.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Not found
        code:
          type: string
          example: not_found
      required: [error]

    Tenant:
      type: object
      properties:
        object:
          type: string
          enum: [tenant]
        id:
          type: string
          example: ten_01JXYZ...
        name:
          type: string
          example: Acme SaaS Co
        raw_api_key:
          type: string
          description: Only returned on creation. Store it immediately — it cannot be retrieved again.
          example: sk_test_a1b2c3...
        key_prefix:
          type: string
          example: sk_test_a1b2
        mode:
          type: string
          enum: [test, live]
        created_at:
          type: string
          format: date-time

    Customer:
      type: object
      properties:
        object:
          type: string
          enum: [customer]
        id:
          type: string
          example: cus_01JABC...
        external_ref:
          type: string
          description: Your own system's user ID. Use this to look up customers by your ID.
          example: user_12345
        name:
          type: string
          example: Acme Corp
        created_at:
          type: string
          format: date-time

    Entitlements:
      type: object
      properties:
        object:
          type: string
          enum: [entitlements]
        subscription_id:
          type: string
          nullable: true
          example: sub_01JABC...
        state:
          type: string
          nullable: true
          enum: [active, trialing, past_due, grace, delinquent, paused, canceled]
          example: active
        has_access:
          type: boolean
          description: >
            True if the customer should have access to paid features.
            Active, trialing, past_due, and grace all return true.
          example: true
        tier:
          type: string
          enum: [full, free]
          example: full
        features:
          type: array
          items:
            type: string
          example: []

    PlanGroup:
      type: object
      properties:
        object:
          type: string
          enum: [plan_group]
        id:
          type: string
          example: pg_01JABC...
        name:
          type: string
          example: Core
        created_at:
          type: string
          format: date-time

    Plan:
      type: object
      properties:
        object:
          type: string
          enum: [plan]
        id:
          type: string
          example: pln_01JABC...
        plan_group_id:
          type: string
          example: pg_01JABC...
        name:
          type: string
          example: Pro
        amount_minor:
          type: string
          description: Amount in kobo as a string. ₦5,000 = "500000".
          example: "500000"
        interval:
          type: string
          enum: [day, week, month, year]
          example: month
        interval_count:
          type: integer
          example: 1
        trial_period_days:
          type: integer
          example: 14
        lookup_key:
          type: string
          nullable: true
          description: >
            Stable, human-meaningful handle for the plan (e.g. "pro_monthly"). Unique per tenant.
            Reference this instead of the UUID so your app doesn't hardcode environment-specific ids.
          example: pro_monthly
        active:
          type: boolean
          description: >
            `false` when the plan is archived — hidden from the default plan list and closed to
            new subscriptions. Existing subscribers keep billing.
          example: true
        created_at:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        object:
          type: string
          enum: [subscription]
        id:
          type: string
          example: sub_01JABC...
        state:
          type: string
          enum: [incomplete, active, trialing, past_due, grace, delinquent, paused, canceled]
          example: active
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        trial_end_at:
          type: string
          format: date-time
          nullable: true
        next_bill_at:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
          description: True when the subscription is set to cancel at period end (still active until then).
          example: false
        canceled_at:
          type: string
          format: date-time
          nullable: true
        has_card:
          type: boolean
          description: Whether a card token is on file. Transfer-funded subs have none.
          example: true
        scheduled_change:
          type: object
          nullable: true
          description: A pending period-end plan change (e.g. a scheduled downgrade).
          properties:
            id: { type: string }
            new_plan_id: { type: string }
            new_quantity: { type: integer }
            scheduled_for: { type: string, format: date-time, nullable: true }

    PlanChangePreview:
      type: object
      properties:
        object:
          type: string
          enum: [preview]
        direction:
          type: string
          enum: [upgrade, downgrade, lateral]
          example: upgrade
        dueNowMinor:
          type: string
          description: Kobo to charge immediately (upgrade). Zero if deferred.
          example: "466667"
        creditMinor:
          type: string
          description: Kobo to credit to balance (downgrade). Zero if deferred.
          example: "0"
        scheduledFor:
          type: string
          format: date-time
          nullable: true
          description: Set when the change is deferred to period end. Null if immediate.

    VirtualAccount:
      type: object
      properties:
        object:
          type: string
          enum: [virtual_account]
        id:
          type: string
          example: va_01JABC...
        customer_id:
          type: string
          example: cus_01JABC...
        account_number:
          type: string
          example: "9391234567"
        bank_name:
          type: string
          example: Nomba MFB
        account_name:
          type: string
          example: Acme Corp — Plinth
        account_ref:
          type: string
          example: cus_01JABC...
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        object:
          type: string
          enum: [invoice]
        id:
          type: string
          example: inv_01JABC...
        state:
          type: string
          enum: [open, paid, partially_paid, void]
          example: paid
        amount_minor:
          type: string
          description: Total invoice amount in kobo.
          example: "500000"
        amount_paid_minor:
          type: string
          example: "500000"
        billing_mode:
          type: string
          enum: [advance, arrears]
          example: advance
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true

    ClockState:
      type: object
      properties:
        object:
          type: string
          enum: [clock_state]
        mode:
          type: string
          enum: [real, test]
        simulated_now:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    SuspenseItem:
      type: object
      properties:
        object:
          type: string
          enum: [suspense_item]
        id:
          type: string
          example: sus_01JABC...
        tenant_id:
          type: string
        amount_minor:
          type: string
          example: "350000"
        account_ref:
          type: string
          example: unknown_ref_xyz
        narration:
          type: string
          example: UNKNOWN TRANSFER
        reason:
          type: string
          enum: [no_va, no_open_invoice, amount_mismatch]
          example: no_va
        created_at:
          type: string
          format: date-time

    SandboxResult:
      type: object
      properties:
        object:
          type: string
          enum: [sandbox]
        tenant_id:
          type: string
          example: ten_01JXYZ...
        api_key:
          type: string
          description: Your private API key. Store it — it cannot be retrieved again.
          example: sk_test_a1b2c3d4e5f6...
        expires_at:
          type: string
          format: date-time
          description: Sandbox tenants are automatically deleted after 24 hours.
        plans:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              amount_minor:
                type: string
              currency:
                type: string
              interval:
                type: string
        customer:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string

    CancelResult:
      type: object
      properties:
        object: { type: string, enum: [subscription] }
        subscriptionId: { type: string, example: sub_01JABC... }
        state:
          type: string
          enum: [incomplete, active, trialing, past_due, grace, delinquent, paused, canceled]
        cancelAtPeriodEnd: { type: boolean }
        effectiveAt:
          type: string
          format: date-time
          description: When access ends — now for immediate, or the period end for end_of_period.
        policy:
          type: string
          description: The cancel policy applied (end_of_period, immediate, or n/a for reactivate).

    WebhookEndpoint:
      type: object
      properties:
        object: { type: string, enum: [webhook_endpoint] }
        id: { type: string, example: whep_01KWG... }
        url: { type: string }
        description: { type: string, nullable: true }
        enabled: { type: boolean }
        event_types:
          type: array
          items: { type: string }
          description: Empty = all events.
        secret:
          type: string
          description: Returned only on create and rotate.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WebhookDelivery:
      type: object
      properties:
        object: { type: string, enum: [webhook_delivery] }
        id: { type: string, example: whd_01KWG... }
        endpoint_id: { type: string }
        event_id: { type: string }
        event_type: { type: string }
        status:
          type: string
          enum: [pending, retrying, succeeded, failed]
        attempts: { type: integer }
        response_code: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        next_retry_at: { type: string, format: date-time, nullable: true }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

paths:
  # ─────────────────────────────────────────────────────────── Sandbox ──────
  /sandbox/create:
    post:
      operationId: create-sandbox
      summary: Create a sandbox
      description: >
        Provisions an isolated sandbox tenant pre-seeded with three plans (Starter, Pro, Max)
        and one test customer. Returns a private API key. No authentication required.
        The sandbox expires after 24 hours.
      tags: [Sandbox]
      security: []
      responses:
        "201":
          description: Sandbox created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxResult"
              example:
                object: sandbox
                tenant_id: ten_01JXYZ...
                api_key: sk_test_a1b2c3d4e5f6...
                expires_at: "2026-06-19T12:00:00Z"
                plans:
                  - { id: pln_01JAA..., name: Starter, amount_minor: "200000", currency: NGN, interval: month }
                  - { id: pln_01JAB..., name: Pro,     amount_minor: "500000", currency: NGN, interval: month }
                  - { id: pln_01JAC..., name: Max,     amount_minor: "1200000",currency: NGN, interval: month }
                customer:
                  id: cus_01JAD...
                  name: Sandbox Customer
                  email: customer@sandbox.ng

  # ────────────────────────────────────────────────────────── Customers ─────
  /v1/customers:
    post:
      operationId: create-customer
      summary: Create a customer
      description: >
        Creates a new customer. Set `external_ref` to your own system's user ID
        so you can look up customers by your ID later.
      tags: [Customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_ref, name, email]
              properties:
                external_ref:
                  type: string
                  maxLength: 200
                  description: Your internal user ID. Must be unique per tenant.
                  example: user_12345
                name:
                  type: string
                  maxLength: 200
                  example: Acme Corp
                email:
                  type: string
                  format: email
                  example: billing@acme.ng
                phone:
                  type: string
                  maxLength: 20
                  example: "+2348012345678"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: external_ref already exists for this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/customers/{id}/entitlements:
    get:
      operationId: get-customer-entitlements
      summary: Get customer entitlements
      description: >
        Returns whether the customer has access to paid features and at what tier.
        Use this before serving any feature — don't parse subscription state yourself.
        Returns `has_access: false` if the customer has no subscription.
      tags: [Customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: cus_01JABC...
      responses:
        "200":
          description: Entitlement status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlements"
              example:
                object: entitlements
                subscription_id: sub_01JABC...
                state: active
                has_access: true
                tier: full
                features: []
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────────────── Virtual Accounts ─
  /v1/customers/{id}/virtual-account:
    post:
      operationId: provision-virtual-account
      summary: Provision a virtual account
      description: >
        Creates a dedicated bank account number (virtual account) for the customer.
        Transfers sent to this account are automatically matched to open invoices.
        One virtual account per customer.
      tags: [Virtual Accounts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: cus_01JABC...
      responses:
        "201":
          description: Virtual account provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualAccount"
              example:
                object: virtual_account
                id: va_01JABC...
                customer_id: cus_01JABC...
                account_number: "9391234567"
                bank_name: Nomba MFB
                account_name: Acme Corp — Plinth
                account_ref: cus_01JABC...
                created_at: "2026-06-01T00:00:00Z"
        "409":
          description: Customer already has a virtual account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────────────────── Plans ───────
  /v1/plan-groups:
    post:
      operationId: create-plan-group
      summary: Create a plan group
      description: >
        A plan group is a named collection of plans (e.g., "Core" containing Starter, Pro, Max).
        Create the group first, then add plans to it.
      tags: [Plans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Core
                description:
                  type: string
                  maxLength: 500
                  example: Main product tiers
      responses:
        "201":
          description: Plan group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanGroup"

  /v1/plans:
    get:
      operationId: list-plans
      summary: List plans
      description: >
        Returns the tenant's plans. **Active-only by default** — pass `include_archived=true`
        to include archived plans too.
      tags: [Plans]
      parameters:
        - name: include_archived
          in: query
          required: false
          description: Include archived (inactive) plans in the result.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"
    post:
      operationId: create-plan
      summary: Create a plan
      description: >
        Creates a plan within a plan group. Amount is in kobo. Set `trial_period_days`
        to give new subscribers a free trial before the first charge. Set `lookup_key`
        to a stable handle (e.g. `pro_monthly`) so your app can reference the plan by role
        instead of by UUID.
      tags: [Plans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_group_id, name, amount_minor, billing_interval, lookup_key]
              properties:
                plan_group_id:
                  type: string
                  example: pg_01JABC...
                name:
                  type: string
                  maxLength: 100
                  example: Pro
                amount_minor:
                  type: integer
                  description: Price in kobo. ₦5,000 = 500000.
                  example: 500000
                billing_interval:
                  type: string
                  enum: [day, week, month, year]
                  example: month
                billing_interval_count:
                  type: integer
                  default: 1
                  description: e.g., 3 months = interval "month" + count 3
                  example: 1
                trial_period_days:
                  type: integer
                  default: 0
                  example: 14
                lookup_key:
                  type: string
                  pattern: "^[a-z0-9_]+$"
                  description: >
                    **Required.** Stable handle (lowercase letters, numbers, underscores), unique per tenant.
                    Reference this instead of the UUID. Reusing an existing key returns 409.
                  example: pro_monthly
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
              example:
                object: plan
                id: pln_01JABC...
                name: Pro
                amount_minor: "500000"
                lookup_key: pro_monthly
                created_at: "2026-06-01T00:00:00Z"
        "409":
          description: lookup_key already in use for another plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/plans/{id}:
    patch:
      operationId: update-plan
      summary: Update a plan
      description: >
        Updates a plan. Marketing fields (name, `lookup_key`, trial days, `active`) can always
        be changed. **Price and billing interval are immutable once the plan has subscribers** —
        attempting to change them returns 400 (`plan_immutable`). To change a price, create a new
        plan and migrate subscribers with a plan change.
      tags: [Plans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: pln_01JABC...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 100 }
                amount_minor: { type: integer, description: "Only allowed if the plan has no subscribers." }
                billing_interval: { type: string, enum: [day, week, month, year] }
                billing_interval_count: { type: integer }
                trial_period_days: { type: integer }
                lookup_key: { type: string, nullable: true, pattern: "^[a-z0-9_]+$" }
                active: { type: boolean, description: "Set false to archive." }
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          description: Immutable field change rejected (plan has subscribers)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Cannot change amount on a plan that already has subscriptions. Create a new plan and migrate subscribers instead.
    delete:
      operationId: delete-plan
      summary: Delete or archive a plan
      description: >
        **Archive-by-default.** If the plan has any subscriptions it is *archived* (`active=false`):
        existing subscribers keep billing, history is preserved, and it stops accepting new sign-ups.
        Only a plan that was never subscribed is permanently hard-deleted. Historical invoices are
        never affected either way (they snapshot the amount at billing time).
      tags: [Plans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: pln_01JABC...
      responses:
        "200":
          description: Plan archived or deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [plan]
                  id:
                    type: string
                  archived:
                    type: boolean
                    description: true = archived (had subscribers); false = hard-deleted (was unused)
                  deleted:
                    type: boolean
              examples:
                archived:
                  summary: Plan had subscribers → archived
                  value: { object: plan, id: pln_01JABC..., archived: true, deleted: false }
                deleted:
                  summary: Plan was unused → hard-deleted
                  value: { object: plan, id: pln_01JABC..., archived: false, deleted: true }

  # ──────────────────────────────────────────────────── Subscriptions ───────
  /v1/subscriptions:
    post:
      operationId: create-subscription
      summary: Create a subscription
      description: >
        Subscribes a customer to a plan. If the plan has a trial period, the subscription
        starts in `trialing` state and the first charge fires at `trial_end_at`.
        Use `preferred_rail: transfer` for customers who pay by bank transfer.
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, plan_id]
              properties:
                customer_id:
                  type: string
                  example: cus_01JABC...
                plan_id:
                  type: string
                  example: pln_01JABC...
                default_payment_method_id:
                  type: string
                  description: Card token from Nomba. Required for card-rail subscriptions.
                  example: tok_test_visa
                preferred_rail:
                  type: string
                  enum: [card, transfer, direct_debit]
                  default: card
                  example: card
                quantity:
                  type: integer
                  default: 1
                  example: 1
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
              example:
                object: subscription
                id: sub_01JABC...
                state: active
                current_period_start: "2026-06-01T00:00:00Z"
                current_period_end: "2026-07-01T00:00:00Z"
                trial_end_at: null
                next_bill_at: "2026-07-01T00:00:00Z"

  /v1/subscriptions/{id}/status:
    get:
      operationId: get-subscription-status
      summary: Get subscription status
      description: Returns the current access status for a subscription.
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: sub_01JABC...
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlements"
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/subscriptions/{id}/preview-change:
    post:
      operationId: preview-plan-change
      summary: Preview a plan change
      description: >
        Calculates exactly what a plan change would cost without committing it.
        Always call this before `change` so the customer sees the exact amount
        before confirming. Returns proration amounts to the kobo.
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: sub_01JABC...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                  example: pln_01JABC...
                quantity:
                  type: integer
                  example: 1
      responses:
        "200":
          description: Proration preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanChangePreview"
              example:
                object: preview
                direction: upgrade
                dueNowMinor: "466667"
                creditMinor: "0"
                scheduledFor: null

  /v1/subscriptions/{id}/change:
    post:
      operationId: change-plan
      summary: Change plan
      description: >
        Commits a plan change. For upgrades (by default): charges the prorated difference immediately.
        For downgrades (by default): schedules the change at the next period end — no charge now.
        This behaviour is controlled by your TenantPolicy preset.
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: sub_01JABC...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                  example: pln_01JABC...
                quantity:
                  type: integer
                  example: 1
      responses:
        "200":
          description: Plan changed or change scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [subscription]
                  strategy:
                    type: string
                    enum: [immediate_prorated, at_period_end, at_trial_end]
                  direction:
                    type: string
                    enum: [upgrade, downgrade, lateral]
                  invoice_id:
                    type: string
                    nullable: true
                  amount_charged_minor:
                    type: string
                    nullable: true
                  credit_applied_minor:
                    type: string
                    nullable: true
                  scheduled_for:
                    type: string
                    format: date-time
                    nullable: true

  /v1/subscriptions/{id}/scheduled-change/{changeId}:
    delete:
      operationId: cancel-scheduled-change
      summary: Cancel a scheduled plan change
      description: Cancels a pending at-period-end plan change. The subscription stays on the current plan.
      tags: [Subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: sub_01JABC...
        - name: changeId
          in: path
          required: true
          schema:
            type: string
          example: sc_01JABC...
      responses:
        "200":
          description: Scheduled change canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [scheduled_change]
                  id:
                    type: string
                  canceled:
                    type: boolean
                    example: true

  /v1/subscriptions/{id}/checkout-link:
    post:
      operationId: create-checkout-link
      summary: Create a checkout link
      description: >
        Returns a Nomba-hosted checkout link. Used to pay-to-unlock an incomplete subscription, or to
        settle the outstanding invoice on a past_due/grace/delinquent subscription ("Update payment").
        Reconciliation happens on the payment webhook.
      tags: [Subscriptions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: sub_01JABC... }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                callbackUrl: { type: string, description: Where Nomba returns the customer after payment. }
      responses:
        "200":
          description: Checkout link
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutLink: { type: string }
                  orderReference: { type: string }
                  customerId: { type: string }
                  subscriptionId: { type: string }

  /v1/subscriptions/{id}/change-checkout:
    post:
      operationId: change-checkout
      summary: Checkout-funded plan change
      description: >
        For an upgrade when the customer has no card on file: collect the prorated amount via a
        Nomba-hosted checkout. The plan swaps when the payment settles (subscription.upgraded).
        Lateral/downgrade changes need no payment — use /change instead.
      tags: [Subscriptions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: sub_01JABC... }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id: { type: string, example: pln_01STANDARD... }
      responses:
        "200":
          description: Checkout link for the pending change
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutLink: { type: string }
                  orderReference: { type: string }
                  customerId: { type: string }
                  subscriptionId: { type: string }
                  dueMinor: { type: string, description: Prorated amount collected now (kobo). }
                  direction: { type: string, enum: [upgrade] }
                  newPlanName: { type: string }

  /v1/subscriptions/{id}/cancel:
    post:
      operationId: cancel-subscription
      summary: Cancel a subscription
      description: >
        No body. Follows the tenant cancel_policy: end_of_period keeps the subscription active until
        the period end (then cancels at the renewal tick); immediate cancels now. Any pending plan
        change is dropped.
      tags: [Subscriptions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: sub_01JABC... }
      responses:
        "200":
          description: Cancel accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelResult" }

  /v1/subscriptions/{id}/reactivate:
    post:
      operationId: reactivate-subscription
      summary: Reactivate a subscription
      description: >
        Undo a still-pending end_of_period cancel so the subscription keeps renewing. No body. Returns
        409 if the subscription has already ended (start a new one instead).
      tags: [Subscriptions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: sub_01JABC... }
      responses:
        "200":
          description: Cancel reverted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelResult" }

  # ──────────────────────────────────────────────────────── Webhooks ────────
  /v1/webhook-endpoints:
    post:
      operationId: create-webhook-endpoint
      summary: Create an endpoint
      description: The secret (whsec_) is returned only here and on rotate — store it.
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, example: https://yourapp.com/api/plinth/webhook }
                description: { type: string }
                event_types:
                  type: array
                  items: { type: string }
                  description: Omit or pass [] to receive all events.
      responses:
        "201":
          description: Endpoint created (with secret)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookEndpoint" }
    get:
      operationId: list-webhook-endpoints
      summary: List endpoints
      tags: [Webhooks]
      responses:
        "200":
          description: List of endpoints (secrets omitted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, enum: [list] }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/WebhookEndpoint" }

  /v1/webhook-endpoints/{id}:
    patch:
      operationId: update-webhook-endpoint
      summary: Update an endpoint
      tags: [Webhooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: whep_01KWG... }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                description: { type: string }
                enabled: { type: boolean }
                event_types: { type: array, items: { type: string } }
      responses:
        "200":
          description: Updated endpoint
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookEndpoint" }
    delete:
      operationId: delete-webhook-endpoint
      summary: Delete an endpoint
      tags: [Webhooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: whep_01KWG... }
      responses:
        "200":
          description: Deleted

  /v1/webhook-endpoints/{id}/rotate-secret:
    post:
      operationId: rotate-webhook-secret
      summary: Rotate the signing secret
      description: Issues a fresh whsec_ (returned once) and invalidates the old one.
      tags: [Webhooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: whep_01KWG... }
      responses:
        "200":
          description: Endpoint with new secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookEndpoint" }

  /v1/webhook-endpoints/{id}/deliveries:
    get:
      operationId: list-webhook-deliveries
      summary: List deliveries for an endpoint
      tags: [Webhooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: whep_01KWG... }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Deliveries with status counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, enum: [list] }
                  counts:
                    type: object
                    additionalProperties: { type: integer }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/WebhookDelivery" }

  /v1/webhook-endpoints/{id}/deliveries/{deliveryId}/resend:
    post:
      operationId: resend-webhook-delivery
      summary: Resend a delivery
      description: Re-queue a delivery for an immediate re-attempt.
      tags: [Webhooks]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: whep_01KWG... }
        - { name: deliveryId, in: path, required: true, schema: { type: string }, example: whd_01KWG... }
      responses:
        "200":
          description: Delivery re-queued

  # ─────────────────────────────────────────────────────────── Admin ────────
  /admin/clock:
    get:
      operationId: get-clock
      summary: Get current clock state
      description: Returns the current simulated time (test mode only).
      tags: [Admin]
      security: []
      responses:
        "200":
          description: Clock state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockState"
              example:
                object: clock_state
                mode: test
                simulated_now: "2026-07-01T00:00:00Z"
                updated_at: "2026-06-14T10:00:00Z"

  /admin/clock/advance:
    post:
      operationId: advance-clock
      summary: Advance the clock
      description: >
        Fast-forwards simulated time by the specified number of seconds.
        The shared sandbox clock is rate-limited to 1 advance per minute.
        After advancing, call `POST /admin/tick` to trigger billing.
      tags: [Admin]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advanceSeconds]
              properties:
                advanceSeconds:
                  type: integer
                  description: Seconds to advance. Max 63,072,000 (2 years).
                  example: 2592000
      responses:
        "200":
          description: Clock advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockState"

  /admin/clock/reset:
    post:
      operationId: reset-clock
      summary: Reset the clock to real time
      description: Switches the clock back to real-time mode.
      tags: [Admin]
      security: []
      responses:
        "200":
          description: Clock reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockState"

  /admin/tick:
    post:
      operationId: run-tick
      summary: Run the billing tick
      description: >
        Processes all subscriptions due for billing, trials ending, dunning retries,
        grace period checks, and expired sandbox cleanup.
        Must include `tenant_id` as a query parameter.
      tags: [Admin]
      security: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          example: ten_01JXYZ...
      responses:
        "200":
          description: Tick result
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [tick_result]
                  renewed:
                    type: integer
                    example: 3
                  trials_converted:
                    type: integer
                    example: 1
                  failed:
                    type: integer
                    example: 0
                  sandboxes_purged:
                    type: integer
                    example: 0

  /admin/suspense:
    get:
      operationId: list-suspense
      summary: List suspense items
      description: >
        Returns unresolved inbound transfers that couldn't be matched to a customer
        or open invoice. Resolve them manually or wait for the customer to contact you.
      tags: [Admin]
      security: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of suspense items
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SuspenseItem"

  /admin/suspense/{id}/resolve:
    post:
      operationId: resolve-suspense
      summary: Resolve a suspense item
      description: Marks a suspense transfer as manually resolved with an audit note.
      tags: [Admin]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: sus_01JABC...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
                  example: "Matched manually to customer cus_01JABC. Credited their balance."
      responses:
        "200":
          description: Suspense item resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [suspense_item]
                  id:
                    type: string
                  resolved:
                    type: boolean
                    example: true
